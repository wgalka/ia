---
layout: default
---
{{ content }}

<style>
  .markdown-alert { padding: 8px 16px; margin-bottom: 16px; color: inherit; border-left: .25em solid #858585; background-color: rgba(175, 184, 193, 0.2); border-radius: 6px; }
  .markdown-alert-important { border-left-color: #8250df; background-color: rgba(130, 80, 223, 0.1); }
  .markdown-alert-title { display: flex; align-items: center; font-weight: 600; margin-bottom: 4px; color: #8250df; }
  .markdown-alert-title svg { margin-right: 8px; }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('blockquote').forEach(bq => {
      let firstP = bq.querySelector('p');
      if (firstP && firstP.innerHTML.includes('[!IMPORTANT]')) {
        bq.classList.add('markdown-alert', 'markdown-alert-important');
        firstP.innerHTML = firstP.innerHTML.replace(
          '\\[!IMPORTANT\\]', 
          '<span class="markdown-alert-title"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0 1 14.25 13H8.06l-2.573 2.573A1.458 1.458 0 0 1 3 14.543V13H1.75A1.75 1.75 0 0 1 0 11.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.75.75 0 0 1 .53-.22h6.5a.25.25 0 0 0 .25-.25v-9.5a.25.25 0 0 0-.25-.25Zm7 2.25v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 9a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"></path></svg>Important</span>'
        );
      }
    });
  });
</script>
